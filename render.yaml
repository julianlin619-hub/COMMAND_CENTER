services:
  # ── Dashboard (Next.js) ────────────────────────────────────────────────
  - type: web
    name: command-center-dashboard
    runtime: node
    rootDir: dashboard
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: starter
    envVars:
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: /sign-in
      - key: BUFFER_ACCESS_TOKEN
        sync: false
      - key: BUFFER_THREADS_CHANNEL_ID
        sync: false
      - key: APIFY_API_KEY
        sync: false
      - key: APIFY_TWITTER_HANDLE
        sync: false
      - key: CONTENT_BANK_PATH
        sync: false
      - key: CONTENT_BANK_COUNT
        sync: false

  # ── Cron Jobs (Python) ─────────────────────────────────────────────────
  # IMPORTANT: Update the schedule values to match your actual posting cadence.
  # These are placeholders.

  - type: cron
    name: youtube-cron
    runtime: python
    buildCommand: pip install -e .
    startCommand: python -m cron.youtube_cron
    schedule: "0 */4 * * *"  # TODO: set your real schedule
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_REFRESH_TOKEN
        sync: false

  - type: cron
    name: instagram-cron
    runtime: python
    buildCommand: pip install -e .
    startCommand: python -m cron.instagram_cron
    schedule: "0 */4 * * *"  # TODO: set your real schedule
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false

  - type: cron
    name: tiktok-cron
    runtime: python
    buildCommand: pip install -e .
    startCommand: python -m cron.tiktok_cron
    schedule: "0 */4 * * *"  # TODO: set your real schedule
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: TIKTOK_CLIENT_KEY
        sync: false
      - key: TIKTOK_CLIENT_SECRET
        sync: false

  - type: cron
    name: linkedin-cron
    runtime: python
    buildCommand: pip install -e .
    startCommand: python -m cron.linkedin_cron
    schedule: "0 */4 * * *"  # TODO: set your real schedule
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false

  - type: cron
    name: facebook-cron
    runtime: python
    buildCommand: pip install -e .
    startCommand: python -m cron.facebook_cron
    schedule: "0 */4 * * *"  # TODO: set your real schedule
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: FACEBOOK_ACCESS_TOKEN
        sync: false
      - key: FACEBOOK_PAGE_ID
        sync: false

  - type: cron
    name: threads-cron
    runtime: python
    buildCommand: pip install -e .
    startCommand: python -m cron.threads_cron
    schedule: "0 11 * * *"  # Daily at 4am Las Vegas time (PDT = UTC-7)
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: BUFFER_ACCESS_TOKEN
        sync: false
      - key: BUFFER_THREADS_CHANNEL_ID
        sync: false
      - key: THREADS_ACCESS_TOKEN  # optional — only needed for metrics
        sync: false
      - key: APIFY_API_KEY  # optional — needed for tweet scraping
        sync: false
      - key: APIFY_TWITTER_HANDLE  # optional — defaults to AlexHormozi
        sync: false
      - key: CONTENT_BANK_PATH
        sync: false
      - key: CONTENT_BANK_COUNT
        sync: false
