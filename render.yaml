services:
  # ── Dashboard (Next.js) ────────────────────────────────────────────────
  - type: web
    name: command-center-dashboard
    runtime: node
    rootDir: dashboard
    buildCommand: python3 -m pip install --target=./python_deps -r ../requirements.txt && npm install && npm run build
    startCommand: npm start
    # Standard (2 GB RAM) — starter's 512 MB is not enough to run node-canvas
    # + ffmpeg for /api/content-gen/generate without OOM-kill during renders.
    plan: standard
    envVars:
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: ZERNIO_API_KEY
        sync: false
      - key: TWEET_BANK_DATA_DIR
        sync: false
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: /sign-in
      - key: BUFFER_ACCESS_TOKEN
        sync: false
      - key: BUFFER_THREADS_CHANNEL_ID
        sync: false
      - key: APIFY_API_KEY
        sync: false
      - key: APIFY_TWITTER_HANDLE
        sync: false
      - key: CONTENT_BANK_PATH
        sync: false
      - key: CONTENT_BANK_COUNT
        sync: false
      - key: BUFFER_ORG_ID
        sync: false
      - key: DASHBOARD_URL
        value: https://command-center-drnj.onrender.com
      # YouTube (2nd channel) direct-upload flow — see
      # dashboard/src/app/api/youtube-second/*. All runtime lives in the
      # web service; no new cron job is needed for v1.
      - key: YOUTUBE_SECOND_CLIENT_ID
        sync: false
      - key: YOUTUBE_SECOND_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_SECOND_REFRESH_TOKEN
        sync: false
      - key: YOUTUBE_SECOND_DESCRIPTION  # optional — override the default channel description
        sync: false
      # Direct Postgres connection (session pooler, port 5432) — used only
      # by the upload-init route for its advisory-lock-guarded slot claim.
      # Supabase service key via the JS client cannot run arbitrary tx SQL.
      - key: SUPABASE_SESSION_POOLER_URL
        sync: false

  # ── Cron Jobs (Python) ─────────────────────────────────────────────────
  # IMPORTANT: Update the schedule values to match your actual posting cadence.
  # These are placeholders.

  - type: cron
    name: youtube-cron
    runtime: python
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: python -m cron.youtube_cron
    schedule: "0 */4 * * *"  # TODO: set your real schedule
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_REFRESH_TOKEN
        sync: false

  - type: cron
    name: tiktok-pipeline
    runtime: python
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: python -m cron.tiktok_pipeline
    schedule: "0 11 * * *"  # Daily at 11 AM UTC = 4 AM PDT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: APIFY_API_KEY
        sync: false
      - key: APIFY_TWITTER_HANDLE
        sync: false
      - key: BUFFER_ACCESS_TOKEN
        sync: false
      - key: BUFFER_ORG_ID
        sync: false
      - key: DASHBOARD_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: TIKTOK_MIN_LIKES  # optional — default 4000
        sync: false
      - key: TIKTOK_MAX_ITEMS  # optional — default 30
        sync: false

  - type: cron
    name: tiktok-bank-pipeline
    runtime: python
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: python -m cron.tiktok_bank_pipeline
    # Offset from tiktok-pipeline's 11:00 slot so the two don't drive concurrent
    # ffmpeg jobs on the starter-plan dashboard (which OOMs → 502 on the cron side).
    schedule: "15 11 * * *"  # Daily at 11:15 AM UTC = 4:15 AM PDT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: BUFFER_ACCESS_TOKEN
        sync: false
      - key: BUFFER_ORG_ID
        sync: false
      - key: DASHBOARD_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: CONTENT_BANK_PATH  # optional — default data/TweetMasterBank.csv
        sync: false
      - key: TIKTOK_BANK_MIN_LIKES  # optional — default 6500
        sync: false

  - type: cron
    name: linkedin-cron
    runtime: python
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: python -m cron.linkedin_cron
    schedule: "0 */4 * * *"  # TODO: set your real schedule
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false

  - type: cron
    name: facebook-pipeline
    runtime: python
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: python -m cron.facebook_pipeline
    schedule: "30 11 * * *"  # Daily at 11:30 AM UTC = 4:30 AM PDT — 30 min after TikTok runs so its posts are in the DB
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: BUFFER_ACCESS_TOKEN
        sync: false
      - key: BUFFER_ORG_ID
        sync: false
      - key: DASHBOARD_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: instagram-pipeline
    runtime: python
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: python -m cron.instagram_pipeline
    schedule: "30 11 * * *"  # Daily at 11:30 AM UTC = 4:30 AM PDT — same slot as facebook-pipeline (30 min after TikTok)
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: BUFFER_ACCESS_TOKEN
        sync: false
      - key: BUFFER_ORG_ID
        sync: false
      - key: DASHBOARD_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: threads-cron
    runtime: python
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: python -m cron.threads_cron
    schedule: "0 11 * * *"  # Daily at 4am Las Vegas time (PDT = UTC-7)
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: BUFFER_ACCESS_TOKEN
        sync: false
      - key: BUFFER_THREADS_CHANNEL_ID
        sync: false
      - key: THREADS_ACCESS_TOKEN  # optional — only needed for metrics
        sync: false
      - key: APIFY_API_KEY  # optional — needed for tweet scraping
        sync: false
      - key: APIFY_TWITTER_HANDLE  # optional — defaults to AlexHormozi
        sync: false
      - key: CONTENT_BANK_PATH
        sync: false
      - key: CONTENT_BANK_COUNT
        sync: false
